<!DOCTYPE html>
<html>
<head>
    <title>ChordFlow</title>
    <style>
        body {
            font-family: 'Segoe UI', sans-serif;
            background: #f4f7f6;
            padding: 40px;
        }

        .container {
            background: white;
            padding: 30px;
            border-radius: 15px;
            max-width: 800px;
            margin: auto;
            box-shadow: 0 4px 20px rgba(0,0,0,0.08);
        }

        .controls {
            display: flex;
            align-items: center;
            gap: 15px;
            margin-bottom: 30px;
        }

        .btn {
            background: #3498db;
            color: white;
            border: none;
            padding: 8px 15px;
            border-radius: 5px;
            cursor: pointer;
            font-weight: bold;
        }

        .btn:hover {
            background: #2980b9;
        }

        .key-badge {
            background: #e1f5fe;
            color: #01579b;
            padding: 6px 15px;
            border-radius: 20px;
            font-weight: bold;
        }

        .line {
            font-size: 20px;
            margin-bottom: 12px;
        }

        .chord {
            font-weight: bold;
            color: #2c3e50;
            margin-right: 10px;
        }

        a {
            display: inline-block;
            margin-top: 30px;
            color: #007bff;
            text-decoration: none;
        }

    </style>
</head>
<body>

<div class="container">
    <h1>🎵 ChordFlow</h1>

    <div class="controls">
        <span>Transpose:</span>
        <button class="btn" onclick="transpose(-1)">−</button>
        <span id="current-key" class="key-badge">{{ scale }}</span>
        <button class="btn" onclick="transpose(1)">+</button>
    </div>

    {% for item in aligned %}
        <div class="line">
            <span class="chord" data-original="{{ item.chord }}">
                [{{ item.chord }}]
            </span>
            {{ item.line }}
        </div>
    {% endfor %}

    <a href="/">← New Analysis</a>
</div>

<script>
const notes = ['C','C#','D','D#','E','F','F#','G','G#','A','A#','B'];
let currentShift = 0;

function transpose(delta) {
    currentShift += delta;

    document.querySelectorAll('.chord').forEach(el => {
        const original = el.getAttribute('data-original');
        el.innerText = "[" + shiftChord(original, currentShift) + "]";
    });

    const originalKey = "{{ scale }}".replace(" Major", "");
    document.getElementById('current-key').innerText =
        shiftChord(originalKey, currentShift) + " Major";
}

function shiftChord(chord, amount) {
    let parts = chord.split(':');
    let root = parts[0];
    let quality = parts[1] ? ":" + parts[1] : "";

    let index = notes.indexOf(root);
    if (index === -1) return chord;

    let newIndex = (index + amount) % 12;
    if (newIndex < 0) newIndex += 12;

    return notes[newIndex] + quality;
}
</script>

</body>
</html>
